name: 'Deploy Storybook to Chromatic'

on:
  workflow_run:
    workflows: ['Build Storybook']
    types: [completed]

permissions:
  actions: read # needed to download artifacts from the triggering workflow run
  contents: read

jobs:
  deploy-to-chromatic:
    name: Deploy to Chromatic
    runs-on: ubuntu-latest
    # Only proceed if the upstream build workflow succeeded and the PR has the 'chromatic' label
    if: ${{ github.event.workflow_run.conclusion == 'success' && contains(github.event.workflow_run.pull_requests[0].labels.*.name, 'chromatic') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # Chromatic requires full git history to track changes
          fetch-depth: 0
      - name: Download Storybook artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: storybook-static
          path: packages/synapse-react-client/storybook-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Publish to Chromatic
        uses: chromaui/action@1cfa065cbdab28f6ca3afaeb3d761383076a35aa # v11.29.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/synapse-react-client
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: 'main'
          onlyChanged: true
          storybookBuildDir: storybook-static
